blueprint:
  name: Bp-Plugin Ext Motel - LuzServ-SM v1.2
  description: >
    Extensión para Bp-Plugin Motel v2.2.4.2 — Gestión de Luz de Servicio y Registro de Puerta.
    En estado Libre, apaga la luz tras retardo (si no hay movimiento) o a los 20 min.
    Registra aperturas de puerta en estados Libre y Ocupado en un input_text con fecha y hora.
  domain: automation

  input:
    state_plugin:
      name: Estado del Plugin
      description: Mismo input_select del plugin principal (Aseo, Libre, Ocupado, Sucia)
      selector:
        entity:
          domain: input_select

    actuador_luz_serv:
      name: Actuador Luz Servicio
      description: Mismo switch de luz de servicio del plugin principal
      default: []
      selector:
        entity:
          domain: switch
          multiple: true

    motion_sensor:
      name: Sensor de Movimiento (SM)
      description: Sensor consultado al vencer el retardo (antes del tope de 20 min)
      selector:
        entity:
          domain: binary_sensor
          multiple: true

    door_sensor:
      name: Sensor de Puerta
      description: Sensor que registrará los ingresos en estado Libre u Ocupado
      selector:
        entity:
          domain: binary_sensor

    log_text:
      name: Registro Eventos Puerta (input_text)
      description: Entidad donde se guardará el historial (DD/MM HH:MM - Abierto en [Estado])
      selector:
        entity:
          domain: input_text

    delay_luz_serv:
      name: Retardo consulta SM (min)
      description: Tiempo encendida antes de consultar el SM (tope total fijo 20 min)
      default: "10"
      selector:
        select:
          options:
          - "5"
          - "10"
          - "15"
          - "20"
          - "30"

    retry_time:
      name: Tiempo de Reintento (seg)
      description: Tiempo entre reintentos al apagar el switch (Z-Wave/Zigbee)
      default: 2
      selector:
        number:
          min: 1
          max: 10
          step: 1
          unit_of_measurement: s
          mode: slider

trigger:
  # Consulta SM al vencer retardo configurado (≤ 20 min)
  - trigger: state
    entity_id: !input actuador_luz_serv
    to: "on"
    for:
      minutes: !input delay_luz_serv
    id: id_consulta_sm

  # Tope máximo: 20 min encendida en Libre → apagar
  - trigger: state
    entity_id: !input actuador_luz_serv
    to: "on"
    for:  
      minutes: 20
    id: id_max_20min

  # Registro de puerta
  - trigger: state
    entity_id: !input door_sensor
    to: "on"
    id: id_puerta_abierta

action:
  - choose:
      # --- Lógica de Registro de Puerta ---
      - conditions:
          - condition: trigger
            id: id_puerta_abierta
          - condition: template
            value_template: "{{ states(state_plugin_entity) in ['Libre', 'Ocupado'] }}"
        sequence:
          - action: input_text.set_value
            target:
              entity_id: !input log_text
            data:
              value: >
                {{ now().strftime('%d/%m %H:%M') }} - Abierto en {{ states(state_plugin_entity) }}
        alias: "Registro de puerta en Libre u Ocupado"

      # --- Lógica de Luz de Servicio (Solo en Libre) ---
      - conditions:
          - condition: template
            value_template: "{{ states(state_plugin_entity) == 'Libre' }}"
          - condition: or
            conditions:
              - condition: trigger
                id: id_consulta_sm
              - condition: trigger
                id: id_max_20min
        sequence:
          - choose:
              # Tope 20 min → apagar si sigue encendida
              - conditions:
                  - condition: trigger
                    id: id_max_20min
                sequence:
                - repeat:
                    while:
                      - condition: state
                        entity_id: !input actuador_luz_serv
                        state: "on"
                      - condition: template
                        value_template: "{{ states(state_plugin_entity) == 'Libre' }}"
                      - condition: template
                        value_template: "{{ repeat.index <= 3 }}"
                    sequence:
                      - action: switch.turn_off
                        target:
                          entity_id: !input actuador_luz_serv
                      - delay:
                          seconds: !input retry_time
                alias: Libre - tope 20 min apagar luz serv

              # Consulta SM → sin movimiento apaga; con movimiento espera al tope de 20 min
              - conditions:
                  - condition: trigger
                    id: id_consulta_sm
                sequence:
                - choose:
                  - conditions:
                      - condition: state
                        entity_id: !input actuador_luz_serv
                        state: "off"
                    sequence: []
                    alias: Libre - luz serv ya off

                  - conditions:
                      - condition: state
                        entity_id: !input motion_sensor
                        state: "off"
                        match: all
                    sequence:
                    - repeat:
                        while:
                          - condition: state
                            entity_id: !input actuador_luz_serv
                            state: "on"
                          - condition: template
                            value_template: "{{ states(state_plugin_entity) == 'Libre' }}"
                          - condition: template
                            value_template: "{{ repeat.index <= 3 }}"
                        sequence:
                          - action: switch.turn_off
                            target:
                              entity_id: !input actuador_luz_serv
                          - delay:
                              seconds: !input retry_time
                    alias: Libre - SM off, apagar luz serv
                alias: Libre - consulta SM
        alias: "Gestión Luz Servicio en Libre"

variables:
  state_plugin_entity: !input state_plugin

mode: restart
