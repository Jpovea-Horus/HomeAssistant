blueprint:
  name: Bp-Plugin Hotel v1.3.3.1.3
  description: |
    Automatización para gestionar ocupación en una habitación (ej. hotel). Controla actuadores y termostatos según sensores de puerta y movimiento.
    Incluye estado LibrePuertaAb: evita transiciones erróneas a Libre mientras la puerta permanece abierta.
    v1.3.2.9: Fix librePuertaAb - actuador On o SMov en librePuertaAb+libre pasa a puertAbierta+ocupado (solo estados, sin encender equipos; puerta sigue abierta).
    v1.3.3.0: delay_off_sp (sensor puerta). delay_off_actuadores para libre→scan (entrada por SM o por actuadores).
    v1.3.3.1: Evita comandos redundantes en AA/termostatos. Solo envía apagado si hay alguno encendido y solo aplica SetPoint/Fan si hay alguno apagado.
    v1.3.3.1.2: Incluye reintentos para switches (Z-Wave/Zigbee). Consultando estado antes de enviar orden.
    v1.3.3.1.3: Incluye evaluar variables de estados antes de accionar y así si no esta anexado deja por defecto un off ejemplos: modo_actuadoresOn == off [default].

    Asegúrate de configurar:
    Los input_select con las opciones exactas:
    - state_plugin: 'libre', 'ocupado'
    - state_internal: 'libre', 'ocupado', 'scan', 'puertAbierta', 'librePuertaAb'
    - mode_plugin: 'auto', 'manual'

    Los input_boolean con las opciones exactas (on/off):
    - ModoPlg: Modo Plugin
    - ModoAct: Modo Actuadores On
    - ModoThermo: Modo Thermostat
    - ModoPuertAb: Modo Puerta Abierta Inicial
    - ModoSetPointOff: Modo Set Point Off

    Si estas opciones no están configuradas correctamente, la automatización puede no funcionar como se espera.

  domain: automation
  input:
    door_sensor:
      #Sensor de Puerta
      name: Sensor de Puerta
      description: Sensor que detecta la apertura/cierre de la puerta (solo sensores)
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    motion_sensor:
      #Sensor de Movimiento
      name: Sensor de Movimiento
      description: Sensor que detecta movimiento para determinar ocupación (solo sensores)
      selector:
        entity:
          domain: binary_sensor
          multiple: true
    target_actuadoresOn:
      #Actuadores a Encender
      name: actuadores a Encender
      description: Lista de Actuadores que se encenderán al iniciar y apagarán al pasar a libre según ocupación (solo Actuadores)
      default: []
      selector:
        entity:
          domain: switch
          multiple: true
    target_actuadoresOff:
      #Actuadores a Apagar
      name: actuadores a Apagar
      description: Lista de actuadores que se apagarán cuando el estado sea libre (solo Actuadores)
      default: []
      selector:
        entity:
          domain: switch
          multiple: true
    target_climates:
      #Termostatos a Encender
      name: Termostatos a Encender
      description: Lista de termostatos que se configurarán según ocupación (solo Thermostatos)
      default: []
      selector:
        entity:
          domain: climate
          multiple: true
    state_plugin:
      #Estado del Plugin
      name: Estado del Plugin
      description: Input Select (Variable Auxiliar) para el estado del plugin (libre/ocupado). Debe tener opciones 'libre' y 'ocupado'.
      selector:
        entity:
          domain: input_select
    state_internal:
      #Estado de la Ocupacíon
      name: Estado Interno
      description: Input Select (Variable Auxiliar) para los estados internos (libre/ocupado/scan/puertAbierta/librePuertaAb). Debe tener estas opciones.
      selector:
        entity:
          domain: input_select
    mode_plugin:
      #Modos del plugin principal
      name: Modo del Plugin
      description: Input Select (Variable Auxiliar) para el modo del plugin (auto/manual). Debe tener opciones 'auto' y 'manual'.
      selector:
        entity:
          domain: input_select
    mode_activation:
      #Actuadores On
      name: Modo de Activación Actuadores
      description: Input Boolean (Variable Auxiliar) habilita/deshabilita la activación de actuadores (Actuadores) al iniciar ocupación
      default: []
      selector:
        entity:
          domain: input_boolean
    mode_puertAb:
      #Puerta Abierta On
      name: Modo de Activación Modo Puerta Abierta (>= Min) 
      description: Input Boolean (Variable Auxiliar) habilita/deshabilita el apagado de AA (si (state_internal == puertAbierta >= delay_puertAb))
      default: []
      selector:
        entity:
          domain: input_boolean
    mode_thermostat:
      #Modo Thermo inicial
      name: Modo de Termostato
      description: Input Boolean (Variable Auxiliar) habilita/deshabilita el control del termostato al iniciar ocupación
      default: []
      selector:
        entity:
          domain: input_boolean
    temperature_SetPointOn:
      name: Temperatura SetPointOn
      description: Temperatura a establecer cuando los termostatos se encienden al iniciar ocupación si mode_thermostat == On
      default: 24
      selector:
        number:
          min: 16
          max: 30
          unit_of_measurement: "°C"
    fanMode_SetPointOn:
      name: Modo de Ventilador SetPointOn
      description: Modo de ventilador para los termostatos al iniciar ocupación
      default: Auto low
      selector:
        select:
          options:
          - Auto low
          - Low
          - Medium
          - High
    mode_Setpointoff:
      #Modo Thermo continua encendido pero a una temperatura determinada
      name: Modo de SetPointOff
      description: Input Boolean (Variable Auxiliar) habilita/deshabilita el control del SetPointOff al Apagar ocupación
      default: []
      selector:
        entity:
          domain: input_boolean
    temperature_SetPointOff:
      name: Temperatura SetPointOff
      description: Temperatura a establecer cuando los termostatos se encienden al apagar ocupación si mode_Setpointoff == On
      default: 27
      selector:
        number:
          min: 16
          max: 30
          unit_of_measurement: "°C"
    fanMode_SetPointOff:
      name: Modo de Ventilador
      description: Modo de ventilador para los termostatos al apagar ocupación
      default: Auto low
      selector:
        select:
          options:
          - Auto low
          - Low
          - Medium
          - High
    delay_off_sp:
      name: Scan de apagado (tras desactivar sensor puerta)
      description: Tiempo en scan antes de pasar a libre cuando la entrada fue por sensor puerta (libre→puertAbierta→cierra puerta→scan)
      default: "900"
      selector:
        select:
          options:
          - "600"
          - "900"
          - "1200"
          - "1800"
    delay_scan:
      name: Retardo del Sensor Movimiento
      description: Tiempo del sensor de movimiento + 20 segundos para evaliar si está activo
      default: "260"
      selector:
        select:
          options:
          - "140"
          - "260"
          - "500"
          - "920"
    delay_off_actuadores:
      name: Retardo Apagar (sensor movimiento / actuadores)
      description: Tiempo en scan antes de pasar a libre cuando la entrada fue por sensor de movimiento o por encender actuadores (libre→scan)
      default: "900"
      selector:
        select:
          options:
          - "600"
          - "900"
          - "1200"
          - "1800"
          - "3600"
    delay_puertAb:
      name: Retardo para Apagar AA
      description: Tiempo de espera por puerta abierta on para apagar los AA
      default: 300
      selector:
        number:
          min: 1
          max: 3600
          unit_of_measurement: "s"
    retry_time:
      name: Tiempo de Reintento (seg)
      description: Tiempo entre reintentos para asegurar que los switches cambien de estado (Z-Wave).
      default: 1
      selector:
        number:
          min: 1
          max: 10
          step: 1
          unit_of_measurement: s
          mode: slider
variables:
  target_climates: !input target_climates
  target_actuadoresOn: !input target_actuadoresOn
  target_actuadoresOff: !input target_actuadoresOff
  mode_activation_var: !input mode_activation
  mode_puertAb_var: !input mode_puertAb
  mode_thermostat_var: !input mode_thermostat
  mode_Setpointoff_var: !input mode_Setpointoff
  delay_off_sp: !input delay_off_sp
  delay_off_actuadores: !input delay_off_actuadores
  delay_scan: !input delay_scan
  delay_puertAb: !input delay_puertAb
  retry_time: !input retry_time

trigger:
- trigger: state #Door_Open
  entity_id: !input door_sensor
  to: "on"
  id: ID_puertAb

- trigger: state #Door_Closer
  entity_id: !input door_sensor
  to: "off"
  id: ID_scan

- trigger: state #Motion On
  entity_id: !input motion_sensor
  to: "on"
  id: ID_ocupado

- trigger: state #Stados internos Scan
  entity_id: !input state_internal
  to: scan
  for:
    seconds: !input delay_scan
  id: ID_ocupadoSM

- trigger: state #Estados Internos Scan tiempo = (delay_off_sp) from puertAbierta
  entity_id: !input state_internal
  to: scan
  for:
    seconds: !input delay_off_sp
  id: ID_apagar
  from: puertAbierta

- trigger: state #Estados Internos puertAb >> delay_puertAb >> Off AA
  entity_id: !input state_internal
  to: puertAbierta
  for:
    seconds: !input delay_puertAb
  id: ID_puertAbTime

- trigger: state #Estados Internos puertAb >> delay_off_sp >> LibrePuertaAb
  entity_id: !input state_internal
  to: puertAbierta
  for:
    seconds: !input delay_off_sp
  id: ID_puertAb_delay

- trigger: state #Estados Internos scan >> delay_off_sp >> Libre (from librePuertaAb)
  entity_id: !input state_internal
  to: scan
  for:
    seconds: !input delay_off_sp
  id: ID_apagar
  from: librePuertaAb

- trigger: state #Estados Internos scan >> delay_off_actuadores >> Libre (from libre: entrada por SM o actuadores)
  entity_id: !input state_internal
  to: scan
  for:
    seconds: !input delay_off_actuadores
  id: ID_apagar
  from: libre

- trigger: state #Estados del plugin pasa de ocupado a libre >> apagar todo (Web)
  entity_id: !input state_plugin
  from: ocupado
  to: libre
  id: ID_apagar

- trigger: state #Respaldo fijo: si sigue en libre 1 min, reintenta apagar AA
  entity_id: !input state_plugin
  to: libre
  for:
    minutes: 1
  id: ID_timer_respaldo

- trigger: state #Sw on/off de libre a scan
  entity_id: !input target_actuadoresOn
  from: "off"
  to: "on"
  id: ID_SwOn

- trigger: state #Sw Off on/off de scan a ocup
  entity_id: !input target_actuadoresOff
  from: "off"
  to: "on"
  id: ID_SwOffOn

# condition: []

action:
- choose:
  - conditions:
    #Respaldo fijo: 1 min en libre, si hay AA encendido reenvia apagado
    - condition: trigger
      id: ID_timer_respaldo
    - condition: state
      entity_id: !input state_plugin
      state: libre
    sequence:
    - condition: template
      value_template: "{{ target_climates | length > 0 }}"
    - condition: template
      value_template: >
        {{ expand(target_climates)
           | selectattr('state', 'ne', 'off')
           | list | count > 0 }}
    - action: climate.turn_off
      target:
        entity_id: !input target_climates
    alias: Scena_Respaldo_timer_climate

  - conditions:
    #Scena Encender SDoor libre a ocup
    - condition: state
      entity_id: !input state_plugin
      state: libre
    - condition: trigger
      id: ID_puertAb
    sequence:
    - action: input_select.select_option
      data:
        option: puertAbierta
      target:
        entity_id: !input state_internal
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_plugin
    - if:
      #si mode_plugin = auto >> All = ON
      - condition: state
        entity_id: !input mode_plugin
        state: auto
      then:
      - if:
        #si mode_activation = ON >> SW = ON
        - condition: template
          value_template: "{{ is_state(mode_activation_var, 'on') }}"
        then:
        - repeat:
            while:
              - condition: template
                value_template: >
                  {{ expand(target_actuadoresOn) 
                     | selectattr('state', 'eq', 'off') 
                     | list | count > 0 }}
              - condition: template
                value_template: "{{ repeat.index <= 3 }}"
            sequence:
              - action: switch.turn_on
                target:
                  entity_id: !input target_actuadoresOn
              - delay:
                  seconds: !input retry_time
      - if:
        #si mode_thermostat = ON >> thermostat = ON
        - condition: template
          value_template: "{{ is_state(mode_thermostat_var, 'on') }}"
        then:
        - condition: template
          value_template: >
            {{ expand(target_climates)
               | selectattr('state', 'eq', 'off')
               | list | count > 0 }}
        - action: climate.set_temperature
          data:
            hvac_mode: cool
            temperature: !input temperature_SetPointOn
          target:
            entity_id: !input target_climates

        - action: climate.set_fan_mode
          # metadata: {}
          data:
            fan_mode: !input fanMode_SetPointOn
          target:
            entity_id: !input target_climates
    alias: Scena_Encender_SDoor_libre_a_ocup

  - conditions:
    #Scena Encender SMov libre a scan
    - condition: state
      entity_id: !input state_internal
      state: libre
    - condition: trigger
      id: ID_ocupado
    sequence:
    - action: input_select.select_option
      data:
        option: scan
      target:
        entity_id: !input state_internal
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_plugin
    - if:
      #si mode_plugin = auto >> All = ON
      - condition: state
        entity_id: !input mode_plugin
        state: auto
      then:
      - if:
        #si mode_thermostat = ON >> thermostat = ON
        - condition: template
          value_template: "{{ is_state(mode_thermostat_var, 'on') }}"
        then:
        - condition: template
          value_template: >
            {{ expand(target_climates)
               | selectattr('state', 'eq', 'off')
               | list | count > 0 }}
        - action: climate.set_temperature
          data:
            hvac_mode: cool
            temperature: !input temperature_SetPointOn
          target:
            entity_id: !input target_climates

        - action: climate.set_fan_mode
          # metadata: {}
          data:
            fan_mode: !input fanMode_SetPointOn
          target:
            entity_id: !input target_climates
    alias: Scena_Encender_SMov_libre_a_scan

  - conditions:
    #Scena SMov librePuertaAb: motion On >> puertAbierta + ocupado (solo estados, sin encender nada; puerta sigue abierta)
    - condition: state
      entity_id: !input state_internal
      state: librePuertaAb
    - condition: state
      entity_id: !input state_plugin
      state: libre
    - condition: trigger
      id: ID_ocupado
    sequence:
    - action: input_select.select_option
      data:
        option: puertAbierta
      target:
        entity_id: !input state_internal
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_plugin
    alias: Scena_SMov_librePuertaAb_a_puertAb_ocup

  - conditions:
    #Scena SW librePuertaAb: actuador On >> puertAbierta + ocupado (solo estados, sin encender nada; puerta sigue abierta)
    - condition: state
      entity_id: !input state_internal
      state: librePuertaAb
    - condition: state
      entity_id: !input state_plugin
      state: libre
    - condition: trigger
      id: ID_SwOn
    sequence:
    - action: input_select.select_option
      data:
        option: puertAbierta
      target:
        entity_id: !input state_internal
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_plugin
    alias: Scena_SW_librePuertaAb_a_puertAb_ocup

  - conditions:
    #Scena SW libre a scan
    - condition: state
      entity_id: !input state_plugin
      state: libre
    - condition: trigger
      id: ID_SwOn
    sequence:
    - action: input_select.select_option
      data:
        option: scan
      target:
        entity_id: !input state_internal
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_plugin
    alias: Scena_SW_libre_a_scan

  - conditions:
    #Scena SW scan a ocup (Actuadores On/Off encendidos)
    - condition: state
      entity_id: !input state_internal
      state: scan
      for:
        seconds: 5
    - condition: or
      conditions:
      - condition: trigger
        id: ID_SwOn
      - condition: trigger
        id: ID_SwOffOn
    sequence:
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_internal
    alias: Scena_SW_scan_a_ocup

  - conditions:
    #Scena puertAbierta + delay + motion OFF >> LibrePuertaAb // Scena_puertAb_a_librePuertaAb
    - condition: trigger
      id: ID_puertAb_delay
    - condition: state
      entity_id: !input motion_sensor
      state: "off"
    sequence:
    - action: input_select.select_option
      data:
        option: librePuertaAb
      target:
        entity_id: !input state_internal
    - action: input_select.select_option
      data:
        option: libre
      target:
        entity_id: !input state_plugin
    - if:
      - condition: state
        entity_id: !input mode_plugin
        state: auto
      then:
      - repeat:
          while:
            - condition: template
              value_template: >
                {{ expand(target_actuadoresOn) 
                   | selectattr('state', 'eq', 'on') 
                   | list | count > 0 }}
            - condition: template
              value_template: "{{ repeat.index <= 3 }}"
          sequence:
            - action: switch.turn_off
              target:
                entity_id: !input target_actuadoresOn
            - delay:
                seconds: !input retry_time
      - repeat:
          while:
            - condition: template
              value_template: >
                {{ expand(target_actuadoresOff) 
                   | selectattr('state', 'eq', 'on') 
                   | list | count > 0 }}
            - condition: template
              value_template: "{{ repeat.index <= 3 }}"
          sequence:
            - action: switch.turn_off
              target:
                entity_id: !input target_actuadoresOff
            - delay:
                seconds: !input retry_time
      - choose:
        - conditions:
          - condition: template
            value_template: "{{ not is_state(mode_Setpointoff_var, 'on') }}"
          sequence:
          - condition: template
            value_template: >
              {{ expand(target_climates)
                 | selectattr('state', 'ne', 'off')
                 | list | count > 0 }}
          - action: climate.turn_off
            target:
              entity_id: !input target_climates
        - conditions:
          - condition: template
            value_template: "{{ is_state(mode_Setpointoff_var, 'on') }}"
          sequence:
          - condition: template
            value_template: >
              {{ expand(target_climates)
                 | selectattr('state', 'eq', 'off')
                 | list | count > 0 }}
          - action: climate.set_temperature
            data:
              temperature: !input temperature_SetPointOff
              hvac_mode: cool
            target:
              entity_id: !input target_climates
          - action: climate.set_fan_mode
            data:
              fan_mode: !input fanMode_SetPointOff
            target:
              entity_id: !input target_climates
    alias: Scena_puertAb_a_librePuertaAb

  - conditions:
    #Scena (puertAb o librePuertaAb) + cierre puerta >> scan
    - condition: trigger
      id: ID_scan
    sequence:
    - choose:
      - conditions:
        - condition: state
          entity_id: !input state_internal
          state: puertAbierta
        sequence:
        - action: input_select.select_option
          data:
            option: scan
          target:
            entity_id: !input state_internal
        - action: input_select.select_option
          data:
            option: ocupado
          target:
            entity_id: !input state_plugin
      - conditions:
        - condition: state
          entity_id: !input state_internal
          state: librePuertaAb
        sequence:
        - action: input_select.select_option
          data:
            option: scan
          target:
            entity_id: !input state_internal
        - action: input_select.select_option
          data:
            option: ocupado
          target:
            entity_id: !input state_plugin
        - if:
          - condition: state
            entity_id: !input mode_plugin
            state: auto
          then:
          - if:
            - condition: template
              value_template: "{{ is_state(mode_thermostat_var, 'on') }}"
            then:
            - condition: template
              value_template: >
                {{ expand(target_climates)
                   | selectattr('state', 'eq', 'off')
                   | list | count > 0 }}
            - action: climate.set_temperature
              data:
                hvac_mode: cool
                temperature: !input temperature_SetPointOn
              target:
                entity_id: !input target_climates
            - action: climate.set_fan_mode
              data:
                fan_mode: !input fanMode_SetPointOn
              target:
                entity_id: !input target_climates
      - conditions:
        - condition: state
          entity_id: !input state_internal
          state: libre
        sequence:
        - action: input_select.select_option
          data:
            option: ocupado
          target:
            entity_id: !input state_plugin
        - action: input_select.select_option
          data:
            option: scan
          target:
            entity_id: !input state_internal
    alias: Scena_puertAb_a_scan

  - conditions:
    #Scena scan a ocup
    - condition: state
      entity_id: !input state_internal
      state: scan
    - condition: trigger
      id: ID_ocupado
    sequence:
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_internal
    alias: Scena_scan_a_ocup

  - conditions:
    #Scena SMtimer scan a ocup
    - condition: trigger
      id: ID_ocupadoSM
    - condition: state
      entity_id: !input motion_sensor
      state: "on"
    sequence:
    - action: input_select.select_option
      data:
        option: ocupado
      target:
        entity_id: !input state_internal
    alias: Scena_SMtimer_scan_a_ocup

  - conditions:
    #Scena ocup a puertAb by SDoor
    - condition: state
      entity_id: !input state_internal
      state: ocupado
    - condition: trigger
      id: ID_puertAb
    sequence:
    - action: input_select.select_option
      data:
        option: puertAbierta
      target:
        entity_id: !input state_internal
    alias: Scena_ocup_a_puertAb

  - conditions:
    #Scena scan a puertAb by SDoor
    - condition: state
      entity_id: !input state_internal
      state: scan
    - condition: trigger
      id: ID_puertAb
    sequence:
    - action: input_select.select_option
      data:
        option: puertAbierta
      target:
        entity_id: !input state_internal
    alias: Scena_scan_a_puertAb

  - conditions:
    #Scena Apagar AA por tiempo de puertAbierta
    - condition: trigger
      id: ID_puertAbTime
    - condition: state
      entity_id: !input mode_plugin
      state: auto
    - condition: and
      conditions:
      - condition: template
        value_template: "{{ is_state(mode_puertAb_var, 'on') }}"
      - condition: state
        entity_id: !input motion_sensor
        state: "off"
    - condition: template
      value_template: >
        {{ expand(target_climates)
           | selectattr('state', 'ne', 'off')
           | list | count > 0 }}
    sequence:
    - action: climate.turn_off
      # metadata: {}
      data: {}
      target:
        entity_id: !input target_climates
    alias: Scena_puertA_onTime_Off-AA

  - conditions:
    #Scena Apagar a libre (manual libre + puertAbierta >> librePuertaAb)
    - condition: trigger
      id: ID_apagar
    sequence:
    - choose:
      - conditions:
        - condition: state
          entity_id: !input door_sensor
          state: "on"
        - condition: state
          entity_id: !input state_internal
          state: puertAbierta
        sequence:
        - action: input_select.select_option
          data:
            option: librePuertaAb
          target:
            entity_id: !input state_internal
